name: 功能需求
description: 提出新的功能、平台适配或体验改进
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在什么场景下需要这个功能？
      placeholder: 例如：希望把签发的证书导入某个内网服务或工具链。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望 Cert Studio 提供什么行为或界面？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 现在是否有手动绕过方式？它有什么问题？
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P1 - 影响核心流程
        - P2 - 明显提升可用性
        - P3 - 后续优化
    validations:
      required: true
