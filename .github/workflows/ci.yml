name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: install node dependencies
        run: npm ci

      - name: build frontend
        run: npm run build

      - name: upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  rust-tests:
    name: rust-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: install tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: install node dependencies
        run: npm ci

      - name: generate tauri icons
        run: npx tauri icon ./src/assets/logo.png

      - name: run rust tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p src-tauri/target/ci
          cargo test --manifest-path src-tauri/Cargo.toml 2>&1 | tee src-tauri/target/ci/cargo-test.log

      - name: upload rust test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-log
          path: src-tauri/target/ci/cargo-test.log
          if-no-files-found: ignore
          retention-days: 7
