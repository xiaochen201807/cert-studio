name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: install node dependencies
        run: npm ci

      - name: build frontend
        run: npm run build

      - name: run frontend tests
        run: npm test

      - name: upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  rust-tests:
    name: rust-tests-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-test-${{ runner.os }}-

      - name: install tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: run rust clippy
        if: runner.os == 'Linux'
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: run rust tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p src-tauri/target/ci
          cargo test --locked --manifest-path src-tauri/Cargo.toml 2>&1 | tee src-tauri/target/ci/cargo-test.log

      - name: upload rust test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-test-log-${{ runner.os }}
          path: src-tauri/target/ci/cargo-test.log
          if-no-files-found: ignore
          retention-days: 7
