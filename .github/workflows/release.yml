name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # Linux 系统下编译 Tauri v2 需要的前置依赖库
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: install node dependencies
        run: npm ci

      - name: generate tauri icons
        run: npx tauri icon ./src/assets/logo.png

      - name: build tauri application
        run: |
          npm run tauri build

      - name: upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cert-studio-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/cert-studio
            src-tauri/target/release/cert-studio.exe
