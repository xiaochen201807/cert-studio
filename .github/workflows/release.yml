name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "已存在的发布标签，例如 v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 (主流桌面平台)
          - platform: windows-latest
            args: ""
            arch_name: "x64"
            setup: ""

          # Windows ARM64 (支持新兴骁龙 X Elite 等 ARM 电脑)
          - platform: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            arch_name: "arm64"
            setup: "rustup target add aarch64-pc-windows-msvc"

          # macOS Universal (合二为一通用包，同时原生运行在 Intel 芯片和 Apple Silicon M 系列芯片上)
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            arch_name: "universal"
            setup: "rustup target add x86_64-apple-darwin aarch64-apple-darwin"

          # Linux x64
          - platform: ubuntu-latest
            args: ""
            arch_name: "x64"
            setup: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.arch_name }}-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.arch_name }}-
            cargo-${{ runner.os }}-

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # 动态安装交叉编译所需 Target
      - name: setup rust target if needed
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      # Linux 系统下编译 Tauri v2 需要的前置依赖库
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: install node dependencies
        run: npm ci

      - name: generate tauri icons
        run: npx tauri icon ./src/assets/logo.png

      - name: build tauri application
        run: |
          npm run tauri build -- ${{ matrix.args }}

      - name: upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cert-studio-${{ runner.os }}-${{ matrix.arch_name }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/universal-apple-darwin/release/bundle/**
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/**
            src-tauri/target/release/cert-studio
            src-tauri/target/release/cert-studio.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: package release assets
        run: |
          mkdir -p release-assets

          while IFS= read -r -d '' artifact_dir; do
            artifact_name="$(basename "$artifact_dir")"
            (
              cd "$artifact_dir"
              zip -r "$GITHUB_WORKSPACE/release-assets/${artifact_name}.zip" .
            )
          done < <(find release-artifacts -mindepth 1 -maxdepth 1 -type d -print0)

          ls -lh release-assets

      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${RELEASE_TAG}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/*.zip --clobber
          else
            gh release create "$tag" release-assets/*.zip \
              --title "$tag" \
              --generate-notes \
              --verify-tag
          fi
